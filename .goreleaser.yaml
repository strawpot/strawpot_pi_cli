version: 2

builds:
  - dir: pi/wrapper
    main: .
    binary: strawpot_pi
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - formats: [binary]
    name_template: "strawpot_pi-{{ .Os }}-{{ .Arch }}"

release:
  github:
    owner: strawpot
    name: strawpot_pi_cli
